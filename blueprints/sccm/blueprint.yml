manifest_version: 1
id: sccm
name: "SCCM / MECM Hierarchy Lab"
description: >
  Full three-tiered Microsoft Configuration Manager (SCCM/MECM) hierarchy lab.
  Central Administration Site (CAS), child Primary Site (PS1) with all site system
  roles on dedicated servers, a passive site server for HA testing, and a Secondary
  Site — 13 Windows VMs total across 2 VLANs, all domain-joined and auto-enrolled
  as SCCM clients. Vulnerable to nearly all Misconfiguration Manager attack techniques.
  Built on mayyhem.ludus_sccm, extending the original Synzack/kernel-sanders project.
version: 1.0.0
config: range-config.yml

tags:
  - sccm
  - mecm
  - active-directory
  - windows
  - attack-lab
  - misconfiguration-manager
  - lateral-movement

min_ludus_version: "2.0.0"
