manifest_version: 1
id: sccm
name: "SCCM / MECM Hierarchy Lab"
description: >
  Full three-tiered SCCM/MECM hierarchy lab: CAS, child Primary Site
  with all roles on dedicated servers, passive site server for HA, and
  Secondary Site — 13 Windows VMs across 2 VLANs, all domain-joined
  and auto-enrolled as clients. Vulnerable to nearly all Misconfiguration
  Manager attack techniques. Built on mayyhem.ludus_sccm.
