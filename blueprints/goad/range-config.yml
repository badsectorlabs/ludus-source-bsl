# =============================================================================
# GOAD (Game of Active Directory) — Ludus Range Config
# =============================================================================
# Based on: https://github.com/Orange-Cyberdefense/GOAD
# Adapted for Ludus by Bad Sector Labs
#
# 3 forests, 3 domains, 5 Windows servers + 1 Kali attacker
# Includes: ADCS (all ESCs), MSSQL, LAPS, child domain, forest trust,
#           SMB shares, IIS WebDAV, misconfigurations, and more
#
# NOTE: All ludus_windows_utils roles are referenced by their fully qualified
# collection name (badsectorlabs.ludus_windows_utils.*). Install the collection:
#   ludus ansible collection add badsectorlabs.ludus_windows_utils
# Other roles (badsectorlabs.ludus_adcs) are from their own Galaxy namespaces.
# =============================================================================

network:
  inter_vlan_default: ACCEPT
  rules:
    - name: Allow Kali to Windows
      vlan_src: 99
      vlan_dst: 10
      protocol: all
      ports: all
      action: ACCEPT
    - name: Allow Windows to Kali
      vlan_src: 10
      vlan_dst: 99
      protocol: all
      ports: all
      action: ACCEPT

ludus:
  # ===========================================================================
  # DC01 — kingslanding — sevenkingdoms.local (Forest Root)
  # Lannister/Baratheon/Small Council users + forest trust to essos.local
  # ===========================================================================
  - vm_name: '{{ range_id }}-DC01'
    hostname: kingslanding
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 10
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: false
      # Ludus built-in GPO: creates a domain-wide "Disable Windows Defender" GPO
      # applied to all Domain Computers and Domain Users with Enforced:Yes.
      # Covers kingslanding itself. More thorough than Set-MpPreference.
      gpos:
        - disable_defender
    domain:
      fqdn: sevenkingdoms.local
      role: primary-dc
    roles:
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_password_policy
      - name: badsectorlabs.ludus_windows_utils.ludus_bulk_ad_content
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      # Forest trust MUST run after bulk_ad_content on BOTH sides so cross-domain
      # group members (e.g., essos.local\daenerys.targaryen in AcrossTheNarrowSea)
      # can be resolved. Depends on DC03's bulk_ad_content completing first.
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_forest_trust
        depends_on:
          - vm_name: "{{ range_id }}-DC03"
            role: badsectorlabs.ludus_windows_utils.ludus_bulk_ad_content
      - name: badsectorlabs.ludus_windows_utils.ludus_smb_shares
      - name: badsectorlabs.ludus_windows_utils.ludus_files
      # ACLs run LAST to minimize SDPROP reset window — protected objects (Domain Admins,
      # AdminSDHolder) have their ACLs reset by SDPROP every 60 minutes.
      # Running ACLs after all other roles ensures they're set as late as possible.
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_acls
        depends_on:
          - vm_name: "{{ range_id }}-DC03"
            role: badsectorlabs.ludus_windows_utils.ludus_bulk_ad_content
    role_vars:
      ludus_password_policy_mode: goad
      ludus_ad_content_mode: goad
      ludus_ad_acl_mode: goad
      ludus_misconfigs_mode: goad
      # ACL role needs Domain Admin credentials to write ACLs on protected objects
      # (Domain Admins group, AdminSDHolder) — localuser WinRM user lacks this right
      ludus_ad_acl_become_user: "SEVENKINGDOMS\\domainadmin"
      ludus_ad_acl_become_password: "password"
      # Forest trust — sevenkingdoms.local <-> essos.local
      # SID history enabled for cross-forest privilege escalation attack path (mayfly part12)
      ludus_trust_partner_domain: essos.local
      ludus_trust_partner_dc_ip: 10.{{ range_second_octet }}.10.13
      ludus_dns_forward_zone: essos.local
      ludus_dns_forward_server: 10.{{ range_second_octet }}.10.13
      ludus_enable_sid_history: true
      # Cross-domain group members (populated after trust is established)
      ludus_cross_domain_group_members:
        - group: AcrossTheNarrowSea
          members:
            - "essos.local\\daenerys.targaryen"
      ludus_smb_shares_mode: goad
      ludus_files_mode: goad

  # ===========================================================================
  # DC02 — winterfell — north.sevenkingdoms.local (Child Domain)
  # Stark/Night Watch users + anonymous RPC + MSSQL domain accounts
  # ===========================================================================
  - vm_name: '{{ range_id }}-DC02'
    hostname: winterfell
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 11
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: true
    roles:
      - name: badsectorlabs.ludus_windows_utils.ludus_child_domain
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_password_policy
      - name: badsectorlabs.ludus_windows_utils.ludus_bulk_ad_content
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      # anonymous_rpc MUST run AFTER all child domain member joins complete.
      # It applies LSA settings that break NetJoinDomain from workgroup machines.
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_anonymous_rpc
        depends_on:
          - vm_name: "{{ range_id }}-SRV02"
            role: badsectorlabs.ludus_windows_utils.ludus_child_domain_join
      - name: badsectorlabs.ludus_windows_utils.ludus_smb_shares
      - name: badsectorlabs.ludus_windows_utils.ludus_files
      # ACLs run LAST on DC02 — after bulk_ad_content and misconfigs complete.
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_acls
        depends_on:
          - vm_name: "{{ range_id }}-SRV02"
            role: badsectorlabs.ludus_windows_utils.ludus_child_domain_join
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_parent_domain_fqdn: sevenkingdoms.local
      ludus_parent_dc_ip: 10.{{ range_second_octet }}.10.10
      ludus_password_policy_mode: goad
      ludus_ad_content_mode: goad
      ludus_ad_acl_mode: goad
      ludus_misconfigs_mode: goad
      # ACL role needs Domain Admin credentials for north domain
      ludus_ad_acl_become_user: "NORTH\\eddard.stark"
      ludus_ad_acl_become_password: "FightP3aceAndHonor!"
      ludus_smb_shares_mode: goad
      ludus_files_mode: goad

  # ===========================================================================
  # SRV02 — castelblack — north.sevenkingdoms.local (Member Server)
  # MSSQL + IIS WebDAV + SMB shares
  # ===========================================================================
  - vm_name: '{{ range_id }}-SRV02'
    hostname: castelblack
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 12
    ram_gb: 6
    cpus: 2
    windows:
      sysprep: true
    roles:
      # SRV02 must join AFTER ludus_ad_misconfigs completes on DC02.
      # ludus_ad_anonymous_rpc on DC02 depends_on THIS join completing first,
      # preventing it from rebooting DC02 while the join is in progress.
      - name: badsectorlabs.ludus_windows_utils.ludus_child_domain_join
        depends_on:
          - vm_name: "{{ range_id }}-DC02"
            role: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      - name: badsectorlabs.ludus_windows_utils.ludus_iis_webdav
      - name: badsectorlabs.ludus_mssql
      - name: badsectorlabs.ludus_windows_utils.ludus_smb_shares
      - name: badsectorlabs.ludus_windows_utils.ludus_files
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_child_dc_ip: 10.{{ range_second_octet }}.10.11
      ludus_child_dc_hostname: winterfell
      ludus_parent_domain_fqdn: sevenkingdoms.local
      ludus_misconfigs_mode: goad
      # IIS WebDAV
      ludus_iis_webdav_mode: server
      ludus_iis_install_aspnet: true
      ludus_iis_install_legacy_compat: true
      ludus_iis_content_mode: goad
      ludus_iis_upload_dir: C:\inetpub\wwwroot\upload
      ludus_iis_upload_dir_user: IIS_IUSRS
      ludus_iis_upload_dir_rights: FullControl
      # MSSQL
      ludus_mssql_enable_tcp: true
      ludus_mssql_mixed_mode_auth: true
      ludus_mssql_install_ssms: false
      ludus_mssql_fix_dotnet_config: true
      ludus_mssql_enable_sa: true
      ludus_mssql_sa_password: "Sup1_sa_P@ssw0rd!"
      ludus_mssql_sysadmins:
        - NORTH\sql_svc
        - NORTH\jon.snow
      ludus_mssql_impersonations:
        - grantor: sa
          grantee: NORTH\samwell.tarly
        - grantor: NORTH\jon.snow
          grantee: NORTH\brandon.stark
      ludus_mssql_impersonation_users:
        - login: NORTH\arya.stark
          database: master
          impersonate_user: dbo
        - login: NORTH\arya.stark
          database: msdb
          impersonate_user: dbo
      ludus_mssql_linked_servers:
        - name: BRAAVOS
          data_source: braavos.essos.local
          # Only jon.snow gets access to the BRAAVOS linked server (GOAD attack path)
          user_mappings:
            - local_login: "NORTH\\jon.snow"
              remote_user: sa
              remote_password: "sa_P@ssw0rd!Ess0s"
      ludus_smb_shares_mode: goad
      ludus_files_mode: goad

  # ===========================================================================
  # DC03 — meereen — essos.local (Separate Forest)
  # Targaryen/Dothraki users + forest trust to sevenkingdoms.local
  # ===========================================================================
  - vm_name: '{{ range_id }}-DC03'
    hostname: meereen
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 13
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: true
      # Ludus built-in GPO: domain-wide Defender disable for essos.local.
      # Applies to meereen and all essos.local domain members (braavos).
      gpos:
        - disable_defender
    domain:
      fqdn: essos.local
      role: primary-dc
    roles:
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_password_policy
      - name: badsectorlabs.ludus_windows_utils.ludus_bulk_ad_content
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      # LAPS DC-side: schema extension and GPO — must run before braavos client-side
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_laps
      # gMSA: create gmsaDragon$ service account — must run before ACLs
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_gmsa
      # Forest trust MUST run after bulk_ad_content on BOTH sides.
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_forest_trust
        depends_on:
          - vm_name: "{{ range_id }}-DC01"
            role: badsectorlabs.ludus_windows_utils.ludus_bulk_ad_content
      - name: badsectorlabs.ludus_windows_utils.ludus_smb_shares
      # ACLs run LAST on DC03 — after all user/group/trust changes AND after ADCS on SRV03.
      # badsectorlabs.ludus_adcs resets the ESC4 template ACL when it creates the template,
      # so ludus_ad_acls MUST depend on ADCS finishing to apply khal.drogo GenericAll correctly.
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_acls
        depends_on:
          - vm_name: "{{ range_id }}-DC01"
            role: badsectorlabs.ludus_windows_utils.ludus_bulk_ad_content
          - vm_name: "{{ range_id }}-SRV03"
            role: badsectorlabs.ludus_adcs
    role_vars:
      ludus_password_policy_mode: goad
      ludus_ad_content_mode: goad
      ludus_misconfigs_mode: goad
      ludus_ad_acl_mode: goad
      # ACL role needs daenerys.targaryen for essos domain — domainadmin doesn't exist
      # daenerys is required for Configuration NC objects (ESC4 template) and
      # protected objects (drogon via adminCount=1, AdminSDHolder)
      ludus_ad_acl_become_user: "ESSOS\\daenerys.targaryen"
      ludus_ad_acl_become_password: "BurnThemAll!"
      # LAPS DC-side config
      ludus_laps_ou: OU=Laps,DC=essos,DC=local
      ludus_laps_readers:
        - jorah.mormont
        - Spys
      # gMSA — gmsaDragon$ used in the drogon→DA escalation chain
      ludus_gmsa_accounts:
        - name: gmsaDragon
          dns_hostname: gmsaDragon.essos.local
          spns:
            - "HTTP/braavos"
            - "HTTP/braavos.essos.local"
          permitted_hosts:
            - "braavos$"
      # Forest trust — essos.local <-> sevenkingdoms.local
      ludus_trust_partner_domain: sevenkingdoms.local
      ludus_trust_partner_dc_ip: 10.{{ range_second_octet }}.10.10
      ludus_dns_forward_zone: sevenkingdoms.local
      ludus_dns_forward_server: 10.{{ range_second_octet }}.10.10
      # Cross-domain group members (populated after trust is established)
      ludus_cross_domain_group_members:
        - group: DragonsFriends
          members:
            - "sevenkingdoms.local\\tyron.lannister"
            - "essos.local\\daenerys.targaryen"
        - group: Spys
          members:
            - "sevenkingdoms.local\\Small Council"
      ludus_smb_shares_mode: goad

  # ===========================================================================
  # SRV03 — braavos — essos.local (Member Server)
  # ADCS (all ESCs) + MSSQL + LAPS
  # ===========================================================================
  - vm_name: '{{ range_id }}-SRV03'
    hostname: braavos
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 14
    ram_gb: 6
    cpus: 2
    windows:
      sysprep: true
    domain:
      fqdn: essos.local
      role: member
    roles:
      - name: badsectorlabs.ludus_adcs
      - name: ludus_mssql
      # LAPS client-side: move braavos$ to the LAPS OU. DC-side runs on DC03 first.
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_laps
        depends_on:
          - vm_name: "{{ range_id }}-DC03"
            role: badsectorlabs.ludus_windows_utils.ludus_ad_laps
      # gMSA install: Install-ADServiceAccount for gmsaDragon$ on braavos
      # gMSA must be created on DC03 first
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_gmsa
        depends_on:
          - vm_name: "{{ range_id }}-DC03"
            role: badsectorlabs.ludus_windows_utils.ludus_ad_gmsa
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      - name: badsectorlabs.ludus_windows_utils.ludus_smb_shares
    role_vars:
      # ADCS — All ESC attack paths
      ludus_adcs_esc1: true
      ludus_adcs_esc2: true
      ludus_adcs_esc3: true
      ludus_adcs_esc3_cra: true
      ludus_adcs_esc4: true
      ludus_adcs_esc5: true
      ludus_adcs_esc6: true
      ludus_adcs_esc7: true
      ludus_adcs_esc8: true
      ludus_adcs_esc9: true
      ludus_adcs_esc10: true
      ludus_adcs_esc10_case1: true
      ludus_adcs_esc10_case2: true
      ludus_adcs_esc11: true
      ludus_adcs_esc13: true
      ludus_adcs_esc14: true
      ludus_adcs_esc14_create_users: true
      ludus_adcs_esc15: true
      ludus_adcs_esc16: true
      ludus_adcs_esc7_ca_manager_user: viserys.targaryen
      ludus_adcs_esc7_ca_manager_password: GoldCrown
      ludus_adcs_esc13_group: greatmaster
      # MSSQL
      ludus_mssql_enable_tcp: true
      ludus_mssql_mixed_mode_auth: true
      ludus_mssql_install_ssms: false
      ludus_mssql_fix_dotnet_config: true
      ludus_mssql_enable_sa: true
      ludus_mssql_sa_password: "sa_P@ssw0rd!Ess0s"
      ludus_mssql_sysadmins:
        - ESSOS\sql_svc
        - ESSOS\khal.drogo
      ludus_mssql_impersonations:
        - grantor: sa
          grantee: ESSOS\jorah.mormont
      ludus_mssql_linked_servers:
        - name: CASTELBLACK
          data_source: castelblack.north.sevenkingdoms.local
          # Only khal.drogo gets access to the CASTELBLACK linked server (GOAD attack path)
          user_mappings:
            - local_login: "ESSOS\\khal.drogo"
              remote_user: sa
              remote_password: "Sup1_sa_P@ssw0rd!"
      # LAPS
      ludus_laps_client_only: true
      ludus_laps_ou: OU=Laps,DC=essos,DC=local
      ludus_laps_domain_fqdn: essos.local
      ludus_laps_readers:
        - jorah.mormont
        - Spys
      # gMSA — install gmsaDragon$ on braavos (it is the permitted host)
      ludus_gmsa_install_on_host: true
      ludus_gmsa_accounts:
        - name: gmsaDragon
          dns_hostname: gmsaDragon.essos.local
          spns:
            - "HTTP/braavos"
            - "HTTP/braavos.essos.local"
          permitted_hosts:
            - "braavos$"
      ludus_misconfigs_mode: goad
      ludus_smb_shares_mode: goad

  # ===========================================================================
  # Kali — Attacker Box
  # ===========================================================================
  - vm_name: '{{ range_id }}-kali'
    hostname: '{{ range_id }}-kali'
    template: kali-x64-desktop-template
    vlan: 99
    ip_last_octet: 1
    ram_gb: 8
    cpus: 4
    linux: true
    testing:
      snapshot: false
      block_internet: false
