manifest_version: 1
id: goad
name: "Game of Active Directory (GOAD)"
description: >
  Multi-forest AD attack lab based on GOAD. Three domains, two forests:
  sevenkingdoms.local (forest root + north child) and essos.local
  (bidirectional trust). ADCS (ESC1-16), MSSQL impersonation/linked
  servers, LAPS, WebDAV, gMSA, full GOAD ACL attack chain. All
  ludus_windows_utils roles exercised. Includes Kali attacker box.
version: 1.1.35
config: range-config.yml

tags:
  - active-directory
  - windows
  - attack-lab
  - goad
  - adcs
  - mssql
  - multi-domain
  - kerberos

min_ludus_version: "2.0.0"
