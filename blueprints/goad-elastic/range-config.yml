# yaml-language-server: $schema=https://docs.ludus.cloud/schemas/range-config.json
# =============================================================================
# GOAD + Elastic — Ludus Blueprint Range Config
# =============================================================================
# Active Directory attack lab (GOAD topology) with full Elastic Security stack:
#   - Elastic container (SIEM + Fleet) on a dedicated Debian 12 server
#   - Elastic Agent + Sysmon on every Windows VM
#   - All badsectorlabs.ludus_windows_utils roles exercised
#   - Kali attacker box for offense
#
# Topology:
#   VLAN 10 — AD network (DC01, SRV01, WS01)
#   VLAN 20 — Security tooling (elastic-server)
#   VLAN 99 — Attacker (kali)
#
# Domains:
#   corp.local  — single forest, single domain (simplified vs full GOAD)
#                  DC01 (primary-dc) + SRV01 (member) + WS01 (member, Win11)
#
# Deploy order (enforced by depends_on):
#   1. elastic-server — Elastic container up, fleet token written
#   2. DC01 — Domain up, users/groups/ACLs/misconfigs set
#   3. SRV01 — Domain join, misconfigs, IIS WebDAV, SMB shares
#   4. WS01  — Domain join, misconfigs
#   5. Elastic agents on SRV01, WS01, DC01 (depends_on elastic-server)
#
# Estimated deploy time: ~45–60 minutes
# RAM required: ~28 GB (elastic 8 + DC01 6 + SRV01 4 + WS01 6 + kali 4)
# =============================================================================

network:
  inter_vlan_default: ACCEPT
  rules:
    - name: Allow Kali to AD network
      vlan_src: 99
      vlan_dst: 10
      protocol: all
      ports: all
      action: ACCEPT
    - name: Allow AD network to Kali
      vlan_src: 10
      vlan_dst: 99
      protocol: all
      ports: all
      action: ACCEPT
    - name: Allow AD network to Security tooling
      vlan_src: 10
      vlan_dst: 20
      protocol: all
      ports: all
      action: ACCEPT
    - name: Allow Security tooling to AD network
      vlan_src: 20
      vlan_dst: 10
      protocol: all
      ports: all
      action: ACCEPT
    - name: Allow Kali to Security tooling
      vlan_src: 99
      vlan_dst: 20
      protocol: all
      ports: all
      action: ACCEPT

ludus:
  # ===========================================================================
  # elastic-server — Debian 12, VLAN 20
  # Runs Elastic Container Project: Elasticsearch + Kibana + Fleet Server
  # Access Kibana at https://10.X.20.2:5601  (user: elastic / password below)
  # Fleet server: https://10.X.20.2:8220
  # ===========================================================================
  - vm_name: "{{ range_id }}-elastic"
    hostname: "{{ range_id }}-elastic"
    template: debian-12-x64-server-template
    vlan: 20
    ip_last_octet: 2
    ram_gb: 8
    cpus: 4
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - name: badsectorlabs.ludus_elastic_container
    role_vars:
      ludus_elastic_password: "ElasticR0cks!"
      ludus_elastic_stack_version: "9.3.1"

  # ===========================================================================
  # DC01 — corp.local Forest Root Primary DC
  # Users, groups, OUs, password policy, ACLs, misconfigs, SMB shares, files
  # All badsectorlabs.ludus_windows_utils roles exercised
  # ===========================================================================
  - vm_name: "{{ range_id }}-DC01"
    hostname: DC01
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 10
    ram_gb: 6
    cpus: 4
    windows:
      sysprep: false
      gpos:
        - disable_defender
    domain:
      fqdn: corp.local
      role: primary-dc
    roles:
      # Weak password policy — enables attack scenarios
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_password_policy
      # Bulk users, groups, OUs — realistic AD population
      - name: badsectorlabs.ludus_windows_utils.ludus_bulk_ad_content
      # gMSA — create a group managed service account for kerberoasting path
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_gmsa
      # LAPS — schema extension + GPO (client-side runs on SRV01)
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_laps
      # Misconfigurations — LLMNR, SMB signing, AS-REP, unconstrained delegation etc.
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      # SMB shares on DC01
      - name: badsectorlabs.ludus_windows_utils.ludus_smb_shares
      # Honeypot files and credential breadcrumbs
      - name: badsectorlabs.ludus_windows_utils.ludus_files
      # Anonymous RPC — MUST run after SRV01 joins (LSA settings break NetJoinDomain)
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_anonymous_rpc
        depends_on:
          - vm_name: "{{ range_id }}-SRV01"
            role: badsectorlabs.ludus_windows_utils.ludus_child_domain_join
      # ACLs last — minimize SDPROP reset window; depends on SRV01 join + DC01 content
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_acls
        depends_on:
          - vm_name: "{{ range_id }}-SRV01"
            role: badsectorlabs.ludus_windows_utils.ludus_child_domain_join
      # Elastic Agent — depends on elastic container being ready
      - name: badsectorlabs.ludus_elastic_agent
        depends_on:
          - vm_name: "{{ range_id }}-elastic"
            role: badsectorlabs.ludus_elastic_container
    role_vars:
      # Password policy — complexity off, short min length for easy cracking in lab
      ludus_password_policy_min_length: 4
      ludus_password_policy_complexity: false
      ludus_password_policy_lockout_threshold: 0

      # Bulk AD content — IT and HR departments, service accounts, nested groups
      ludus_bulk_ad_ous:
        - name: IT
          path: "DC=corp,DC=local"
        - name: HR
          path: "DC=corp,DC=local"
        - name: ServiceAccounts
          path: "DC=corp,DC=local"
        - name: Workstations
          path: "DC=corp,DC=local"
        - name: Servers
          path: "DC=corp,DC=local"
      ludus_bulk_ad_groups:
        - name: IT-Admins
          scope: Global
          category: Security
          ou: "OU=IT,DC=corp,DC=local"
        - name: HelpDesk
          scope: Global
          category: Security
          ou: "OU=IT,DC=corp,DC=local"
        - name: HR-Staff
          scope: Global
          category: Security
          ou: "OU=HR,DC=corp,DC=local"
        - name: SQLAdmins
          scope: Global
          category: Security
          ou: "OU=ServiceAccounts,DC=corp,DC=local"
      ludus_bulk_ad_users:
        - name: alice.smith
          firstname: Alice
          lastname: Smith
          password: "Password1"
          ou: "OU=IT,DC=corp,DC=local"
          groups:
            - IT-Admins
            - Domain Admins
        - name: bob.jones
          firstname: Bob
          lastname: Jones
          password: "Summer2024"
          ou: "OU=IT,DC=corp,DC=local"
          groups:
            - HelpDesk
        - name: carol.white
          firstname: Carol
          lastname: White
          password: "Welcome1"
          ou: "OU=HR,DC=corp,DC=local"
          groups:
            - HR-Staff
        - name: svc.sql
          firstname: SQL
          lastname: Service
          password: "Serv1ceP@ss!"
          ou: "OU=ServiceAccounts,DC=corp,DC=local"
          groups:
            - SQLAdmins
        # AS-REP roastable — no Kerberos pre-auth
        - name: svc.backup
          firstname: Backup
          lastname: Service
          password: "B@ckupP@ss1"
          ou: "OU=ServiceAccounts,DC=corp,DC=local"
          groups: []
          kerberos_preauthentication: false

      # gMSA for web service — kerberoastable via SPN
      ludus_gmsa_accounts:
        - name: gmsaWeb
          dns_hostname: gmsaWeb.corp.local
          spns:
            - "HTTP/srv01"
            - "HTTP/srv01.corp.local"
          permitted_hosts:
            - "SRV01$"

      # LAPS DC-side — Workstations OU, IT-Admins can read
      ludus_laps_ou: "OU=Workstations,DC=corp,DC=local"
      ludus_laps_readers:
        - IT-Admins
        - alice.smith

      # Misconfigurations on DC01
      ludus_misconfigs_mode: custom
      ludus_misconfigs_disable_smb_signing: true
      ludus_misconfigs_asrep_users:
        - svc.backup

      # SMB shares on DC01
      ludus_smb_shares_enable_anonymous: false
      ludus_smb_shares:
        - name: SYSVOL-Scripts
          path: "C:\\Shares\\Scripts"
          full_access:
            - "CORP\\Domain Admins"
          read_access:
            - "CORP\\Domain Users"
          description: "Administrative scripts"

      # Credential breadcrumb files
      ludus_files_deploy:
        - dest: "C:\\Users\\Public\\Desktop\\credentials.txt"
          content: |
            # Admin credentials (do not share)
            alice.smith : Password1
            svc.sql : Serv1ceP@ss!
        - dest: "C:\\Shares\\Scripts\\setup.ps1"
          content: |
            # Setup script
            $cred = New-Object PSCredential("CORP\alice.smith",
              (ConvertTo-SecureString "Password1" -AsPlainText -Force))

      # ACLs — build attack paths
      ludus_ad_acl_mode: custom
      ludus_ad_acl_become_user: "CORP\\alice.smith"
      ludus_ad_acl_become_password: "Password1"
      ludus_ad_acls_entries:
        # bob.jones (HelpDesk) can force-change carol.white's password
        - source: "CORP\\bob.jones"
          destination: "CORP\\carol.white"
          rights: "ForceChangePassword"
        # svc.sql has GenericAll on IT-Admins group (lateral movement path)
        - source: "CORP\\svc.sql"
          destination: "CORP\\IT-Admins"
          rights: "GenericAll"

      # Elastic Agent — token/server auto-populated from elastic container role output
      ludus_elastic_install_sysmon: true
      ludus_elastic_agent_version: "9.3.1"

  # ===========================================================================
  # SRV01 — corp.local Member Server
  # IIS WebDAV, SMB shares, LAPS client, gMSA install, Elastic Agent + Sysmon
  # ===========================================================================
  - vm_name: "{{ range_id }}-SRV01"
    hostname: SRV01
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 11
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    domain:
      fqdn: corp.local
      role: member
    roles:
      # Domain join — depends on DC01 misconfigs completing (anonymous_rpc ordering)
      - name: badsectorlabs.ludus_windows_utils.ludus_child_domain_join
        depends_on:
          - vm_name: "{{ range_id }}-DC01"
            role: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      # Misconfigurations on SRV01
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      # IIS with WebDAV — NTLM coercion attack surface
      - name: badsectorlabs.ludus_windows_utils.ludus_iis_webdav
      # SMB shares — anonymous access for network recon
      - name: badsectorlabs.ludus_windows_utils.ludus_smb_shares
      # Honeypot files
      - name: badsectorlabs.ludus_windows_utils.ludus_files
      # LAPS client — move SRV01$ to Servers OU
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_laps
        depends_on:
          - vm_name: "{{ range_id }}-DC01"
            role: badsectorlabs.ludus_windows_utils.ludus_ad_laps
      # gMSA client install — Install-ADServiceAccount for gmsaWeb$
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_gmsa
        depends_on:
          - vm_name: "{{ range_id }}-DC01"
            role: badsectorlabs.ludus_windows_utils.ludus_ad_gmsa
      # Elastic Agent — depends on elastic container being ready
      - name: badsectorlabs.ludus_elastic_agent
        depends_on:
          - vm_name: "{{ range_id }}-elastic"
            role: badsectorlabs.ludus_elastic_container
    role_vars:
      # Domain join vars
      ludus_child_domain_fqdn: corp.local
      ludus_child_dc_ip: 10.{{ range_second_octet }}.10.10
      ludus_child_dc_hostname: DC01
      ludus_parent_domain_fqdn: corp.local

      # Misconfigurations on SRV01 — SMB signing disabled, WebClient enabled
      ludus_misconfigs_mode: custom
      ludus_misconfigs_disable_smb_signing: true
      ludus_misconfigs_enable_webdav_client: true
      ludus_misconfigs_enable_spooler: true

      # IIS WebDAV — install both client (WebClient svc) and IIS server
      ludus_iis_webdav_install_client: true
      ludus_iis_webdav_install_server: true

      # SMB shares — public anonymous share
      ludus_smb_shares_enable_anonymous: true
      ludus_smb_shares:
        - name: Public
          path: "C:\\Shares\\Public"
          full_access:
            - Everyone
          description: "Public share"
        - name: IT-Tools
          path: "C:\\Shares\\IT-Tools"
          full_access:
            - "CORP\\IT-Admins"
          read_access:
            - "CORP\\Domain Users"
          description: "IT tooling"

      # Honeypot files on SRV01
      ludus_files_deploy:
        - dest: "C:\\Shares\\Public\\readme.txt"
          content: "Welcome to the IT file share. Contact helpdesk@corp.local for access issues."
        - dest: "C:\\Shares\\IT-Tools\\install.bat"
          content: |
            @echo off
            REM Installation script
            net use \\DC01\NETLOGON /user:CORP\alice.smith Password1

      # LAPS client — place SRV01$ computer object in Servers OU
      ludus_laps_client_only: true
      ludus_laps_ou: "OU=Servers,DC=corp,DC=local"
      ludus_laps_domain_fqdn: corp.local

      # gMSA client install
      ludus_gmsa_install_on_host: true
      ludus_gmsa_accounts:
        - name: gmsaWeb
          dns_hostname: gmsaWeb.corp.local
          spns:
            - "HTTP/srv01"
            - "HTTP/srv01.corp.local"
          permitted_hosts:
            - "SRV01$"

      # Elastic Agent
      ludus_elastic_install_sysmon: true
      ludus_elastic_agent_version: "9.3.1"

  # ===========================================================================
  # WS01 — corp.local Member Workstation (Windows 11)
  # Domain-joined desktop, Elastic Agent + Sysmon, misconfigs
  # ===========================================================================
  - vm_name: "{{ range_id }}-WS01"
    hostname: WS01
    template: win11-22h2-x64-enterprise-template
    vlan: 10
    ip_last_octet: 20
    ram_gb: 6
    cpus: 4
    windows:
      sysprep: true
    domain:
      fqdn: corp.local
      role: member
    roles:
      # Domain join — depends on DC01 being fully provisioned (ACLs last)
      - name: badsectorlabs.ludus_windows_utils.ludus_child_domain_join
        depends_on:
          - vm_name: "{{ range_id }}-DC01"
            role: badsectorlabs.ludus_windows_utils.ludus_ad_acls
      # Workstation misconfigurations
      - name: badsectorlabs.ludus_windows_utils.ludus_ad_misconfigs
      # Files — user breadcrumbs
      - name: badsectorlabs.ludus_windows_utils.ludus_files
      # Elastic Agent — depends on elastic container being ready
      - name: badsectorlabs.ludus_elastic_agent
        depends_on:
          - vm_name: "{{ range_id }}-elastic"
            role: badsectorlabs.ludus_elastic_container
    role_vars:
      # Domain join vars
      ludus_child_domain_fqdn: corp.local
      ludus_child_dc_ip: 10.{{ range_second_octet }}.10.10
      ludus_child_dc_hostname: DC01
      ludus_parent_domain_fqdn: corp.local

      # Workstation misconfigurations
      ludus_misconfigs_mode: custom
      ludus_misconfigs_enable_webdav_client: true
      ludus_misconfigs_disable_smb_signing: true

      # Files — saved credentials, browser-style breadcrumbs
      ludus_files_deploy:
        - dest: "C:\\Users\\Public\\Documents\\VPN-Config.txt"
          content: |
            VPN Server: vpn.corp.local
            Username: carol.white
            Password: Welcome1

      # Elastic Agent
      ludus_elastic_install_sysmon: true
      ludus_elastic_agent_version: "9.3.1"

  # ===========================================================================
  # Kali — Attacker Box
  # Pre-configured for AD/Windows attack tooling
  # ===========================================================================
  - vm_name: "{{ range_id }}-kali"
    hostname: "{{ range_id }}-kali"
    template: kali-x64-desktop-template
    vlan: 99
    ip_last_octet: 1
    ram_gb: 4
    cpus: 4
    linux: true
    testing:
      snapshot: false
      block_internet: false
