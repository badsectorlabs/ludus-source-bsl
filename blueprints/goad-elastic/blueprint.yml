manifest_version: 1
id: goad-elastic
name: "GOAD + Elastic Security"
description: >
  AD attack lab with Elastic Security stack. Single-domain corp.local:
  DC, member server (IIS/WebDAV/SMB), Windows 11 workstation, and
  Elastic SIEM/Fleet server. All ludus_windows_utils roles exercised:
  ACLs, LAPS, gMSA, anonymous RPC, bulk AD content, SMB shares,
  WebDAV, and credential breadcrumbs. Elastic Agents with Sysmon on
  every Windows VM ship telemetry for detection labs.
version: 0.1.0
config: range-config.yml

tags:
  - active-directory
  - elastic
  - siem
  - windows
  - attack-lab
  - sysmon

min_ludus_version: "2.0.0"
