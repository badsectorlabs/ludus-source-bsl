# =============================================================================
# TEST 4 — Child domain join after ludus_ad_misconfigs
# =============================================================================
# Purpose: Does ludus_ad_misconfigs (firewall off, SMB signing off, etc.)
# specifically break or fix the domain join?
#
# If TEST 3 PASSED but TEST 4 FAILS: misconfigs role breaks join
# If TEST 4 PASSES: the issue is ordering (misconfigs runs concurrently or
#   anonymous_rpc fires before join in the full GOAD config)
# =============================================================================

network:
  inter_vlan_default: ACCEPT

ludus:
  - vm_name: '{{ range_id }}-DC01'
    hostname: kingslanding
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 10
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: false
    domain:
      fqdn: sevenkingdoms.local
      role: primary-dc

  # Child DC — all roles up to and including misconfigs
  - vm_name: '{{ range_id }}-DC02'
    hostname: winterfell
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 11
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - name: ludus_child_domain
      - name: ludus_ad_password_policy
      - name: ludus_bulk_ad_content
      - name: ludus_ad_misconfigs
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_parent_domain_fqdn: sevenkingdoms.local
      ludus_parent_dc_ip: 10.{{ range_second_octet }}.10.10
      ludus_password_policy_mode: goad
      ludus_ad_content_mode: goad
      ludus_misconfigs_mode: goad

  # Member server — join after misconfigs completes on DC02
  - vm_name: '{{ range_id }}-SRV02'
    hostname: castelblack
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 12
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - name: ludus_child_domain_join
        depends_on:
          - vm_name: "{{ range_id }}-DC02"
            role: ludus_ad_misconfigs
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_child_dc_ip: 10.{{ range_second_octet }}.10.11
