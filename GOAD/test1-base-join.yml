# =============================================================================
# TEST 1 — Minimal child domain join: NO roles on DC02, Ludus native provisioning
# =============================================================================
# Purpose: Can we join a member server to a Ludus-provisioned child DC with
# zero custom roles? DC02 uses domain: block so Ludus handles promotion natively.
#
# If FAILS: the issue exists in Ludus base provisioning / win2022 template
# If PASSES: the issue is introduced by one of our custom roles
# =============================================================================

network:
  inter_vlan_default: ACCEPT

ludus:
  # Forest root — no roles
  - vm_name: '{{ range_id }}-DC01'
    hostname: kingslanding
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 10
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: false
    domain:
      fqdn: sevenkingdoms.local
      role: primary-dc

  # Child DC — domain block only, NO custom roles
  - vm_name: '{{ range_id }}-DC02'
    hostname: winterfell
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 11
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    domain:
      fqdn: north.sevenkingdoms.local
      role: alt-dc

  # Member server — join using bare role, no depends_on needed since
  # Ludus base provisioning handles DC02 before user-defined-roles run
  - vm_name: '{{ range_id }}-SRV02'
    hostname: castelblack
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 12
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - name: ludus_child_domain_join
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_child_dc_ip: 10.{{ range_second_octet }}.10.11
