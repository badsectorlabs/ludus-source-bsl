# =============================================================================
# TEST 3 — Child domain join after bulk_ad_content + password_policy
# =============================================================================
# Purpose: Does adding GOAD users/password policy break the domain join?
# SRV02 join depends_on ludus_bulk_ad_content completing on DC02.
#
# If TEST 2 PASSED but TEST 3 FAILS: bulk_ad_content or password_policy
#   changes something (e.g. a restrictive domain policy) that prevents joins
# If TEST 3 PASSES: move to test4 (add ludus_ad_misconfigs)
# =============================================================================

network:
  inter_vlan_default: ACCEPT

ludus:
  - vm_name: '{{ range_id }}-DC01'
    hostname: kingslanding
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 10
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: false
    domain:
      fqdn: sevenkingdoms.local
      role: primary-dc

  # Child DC — child_domain + password_policy + bulk content
  - vm_name: '{{ range_id }}-DC02'
    hostname: winterfell
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 11
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - name: ludus_child_domain
      - name: ludus_ad_password_policy
      - name: ludus_bulk_ad_content
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_parent_domain_fqdn: sevenkingdoms.local
      ludus_parent_dc_ip: 10.{{ range_second_octet }}.10.10
      ludus_password_policy_mode: goad
      ludus_ad_content_mode: goad

  # Member server — join after bulk_ad_content completes
  - vm_name: '{{ range_id }}-SRV02'
    hostname: castelblack
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 12
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - name: ludus_child_domain_join
        depends_on:
          - vm_name: "{{ range_id }}-DC02"
            role: ludus_bulk_ad_content
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_child_dc_ip: 10.{{ range_second_octet }}.10.11
