# =============================================================================
# TEST 4a — misconfigs WITHOUT smb_signing_disabled and WITHOUT webclient
# =============================================================================
# Purpose: Does misconfigs break the join when SMB signing is LEFT enabled
# and webclient (which reboots) is disabled?
# Isolates whether SMB signing or the reboot is the breaking change.
# =============================================================================

network:
  inter_vlan_default: ACCEPT

ludus:
  - vm_name: '{{ range_id }}-DC01'
    hostname: kingslanding
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 10
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: false
    domain:
      fqdn: sevenkingdoms.local
      role: primary-dc

  - vm_name: '{{ range_id }}-DC02'
    hostname: winterfell
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 11
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - name: ludus_child_domain
      - name: ludus_ad_password_policy
      - name: ludus_bulk_ad_content
      - name: ludus_ad_misconfigs
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_parent_domain_fqdn: sevenkingdoms.local
      ludus_parent_dc_ip: 10.{{ range_second_octet }}.10.10
      ludus_password_policy_mode: goad
      ludus_ad_content_mode: goad
      # Custom misconfigs — GOAD winterfell settings but WITHOUT smb_signing and webclient
      ludus_misconfigs_mode: custom
      ludus_firewall_disabled: true
      ludus_llmnr_enabled: true
      ludus_nbt_ns_enabled: true
      ludus_print_spooler_enabled: true
      ludus_smb_signing_disabled: false   # SMB signing LEFT ENABLED
      ludus_webclient_enabled: false       # No webclient (no reboot)
      ludus_autologon_enabled: true
      ludus_autologon_user: "robb.stark"
      ludus_autologon_password: "sexywolfy"
      ludus_autologon_domain: "NORTH"

  - vm_name: '{{ range_id }}-SRV02'
    hostname: castelblack
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 12
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - name: ludus_child_domain_join
        depends_on:
          - vm_name: "{{ range_id }}-DC02"
            role: ludus_ad_misconfigs
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_child_dc_ip: 10.{{ range_second_octet }}.10.11
