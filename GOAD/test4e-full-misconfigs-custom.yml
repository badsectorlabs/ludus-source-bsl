# =============================================================================
# TEST 4e — misconfigs with the EXCLUDED settings from 4a added back
# local_groups, credential_manager, asrep, delegation, scheduled_tasks, gpo
# =============================================================================

network:
  inter_vlan_default: ACCEPT

ludus:
  - vm_name: '{{ range_id }}-DC01'
    hostname: kingslanding
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 10
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: false
    domain:
      fqdn: sevenkingdoms.local
      role: primary-dc

  - vm_name: '{{ range_id }}-DC02'
    hostname: winterfell
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 11
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - name: ludus_child_domain
      - name: ludus_ad_password_policy
      - name: ludus_bulk_ad_content
      - name: ludus_ad_misconfigs
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_parent_domain_fqdn: sevenkingdoms.local
      ludus_parent_dc_ip: 10.{{ range_second_octet }}.10.10
      ludus_password_policy_mode: goad
      ludus_ad_content_mode: goad
      # Everything from 4a PLUS the previously excluded settings
      ludus_misconfigs_mode: custom
      ludus_firewall_disabled: true
      ludus_smb_signing_disabled: true
      ludus_webclient_enabled: true
      ludus_llmnr_enabled: true
      ludus_nbt_ns_enabled: true
      ludus_print_spooler_enabled: true
      ludus_autologon_enabled: true
      ludus_autologon_user: "robb.stark"
      ludus_autologon_password: "sexywolfy"
      ludus_autologon_domain: "NORTH"
      # Now adding the previously excluded settings:
      ludus_local_groups:
        - group: "Administrators"
          members:
            - "NORTH\\eddard.stark"
            - "NORTH\\catelyn.stark"
            - "NORTH\\robb.stark"
        - group: "Remote Desktop Users"
          members:
            - "NORTH\\Stark"
      ludus_credential_manager_entries:
        - target: "TERMSRV/castelblack"
          username: "NORTH\\robb.stark"
          password: "sexywolfy"
      ludus_asrep_roast_users:
        - name: "brandon.stark"
          domain: "north.sevenkingdoms.local"
      ludus_unconstrained_delegation_users:
        - name: "sansa.stark"
          domain: "north.sevenkingdoms.local"
      ludus_constrained_delegation_any:
        - name: "jon.snow"
          domain: "north.sevenkingdoms.local"
          spns:
            - "CIFS/winterfell.north.sevenkingdoms.local"
          allowed_to_delegate:
            - "CIFS/winterfell.north.sevenkingdoms.local"
            - "CIFS/winterfell"
      ludus_scheduled_tasks:
        - name: "ntlm_relay_bot"
          description: "NTLM relay bot"
          user: "NORTH\\eddard.stark"
          password: "FightP3aceAndHonor!"
          command: "cmd.exe"
          arguments: '/c powershell -Command "New-PSDrive -Name X -PSProvider FileSystem -Root \\\\meereen\\Private -ErrorAction SilentlyContinue"'
          repeat_interval: "PT5M"
      ludus_gpo_abuse_enabled: true
      ludus_gpo_abuse_name: "StarkWallpaper"
      ludus_gpo_abuse_link_target: "OU=Domain Controllers,DC=north,DC=sevenkingdoms,DC=local"
      ludus_gpo_abuse_editors:
        - name: "samwell.tarly"
          permission: "GpoEditDeleteModifySecurity"

  - vm_name: '{{ range_id }}-SRV02'
    hostname: castelblack
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 12
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - name: ludus_child_domain_join
        depends_on:
          - vm_name: "{{ range_id }}-DC02"
            role: ludus_ad_misconfigs
    role_vars:
      ludus_child_domain_fqdn: north.sevenkingdoms.local
      ludus_child_dc_ip: 10.{{ range_second_octet }}.10.11
